name: 'Update GitOps Manifest'
description: 'Updates K8s deployment manifests and pushes to ArgoCD repo'
inputs:
  gitops_repo:
    description: 'GitOps repository URL (without https://)'
    required: true
  deployment_file:
    description: 'Path to the deployment file inside the repo'
    required: true
  image_tag:
    description: 'New Docker image tag to apply'
    required: true
  commit_message:
    description: 'Commit message for the update'
    required: true
  gitops_pat:
    description: 'Personal Access Token for GitOps repo'
    required: true

runs:
  using: "composite"
  steps:
    - name: Run Update Logic
      shell: bash
      env:
        # Pass inputs through the environment so their contents are never
        # interpolated into the script text. Commit messages (and other inputs)
        # may contain quotes/newlines/shell metacharacters; referencing them as
        # quoted bash variables avoids broken quoting and shell injection.
        GITOPS_PAT: ${{ inputs.gitops_pat }}
        GITOPS_REPO: ${{ inputs.gitops_repo }}
        DEPLOYMENT_FILE: ${{ inputs.deployment_file }}
        IMAGE_TAG: ${{ inputs.image_tag }}
        COMMIT_MESSAGE: ${{ inputs.commit_message }}
      run: |
        echo "::group::Initialize and Clone"
        wget -q https://github.com/mikefarah/yq/releases/download/v4.52.5/yq_linux_amd64 -O ./yq
        chmod +x ./yq
        git clone "https://${GITOPS_PAT}@${GITOPS_REPO}" argocd
        cd argocd
        echo "::endgroup::"

        echo "::group::Apply YQ Update"
        # Extract the repository/image name and append the new tag
        IMAGE_TAG="$IMAGE_TAG" ../yq -i ".spec.template.spec.containers[0].image = strenv(IMAGE_TAG)" "$DEPLOYMENT_FILE"
        echo "::endgroup::"

        echo "::group::Commit and Push Changes"
        git config user.name "Gitea Actions"
        git config user.email "actions@gitea.com"
        git add "$DEPLOYMENT_FILE"
        git commit -m "$COMMIT_MESSAGE"
        git push origin main
        echo "::endgroup::"
